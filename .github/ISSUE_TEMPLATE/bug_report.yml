name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what's happening.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to reproduce the behavior.
      placeholder: |
        1. Create a scheduler with `Scheduler::builder()...`
        2. Submit a task with `...`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Taskmill version
      description: The version of taskmill in your Cargo.toml
      placeholder: "0.1.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / etc."

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output or panic messages.
      render: shell
